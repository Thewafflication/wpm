name: Test Reports

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-x86-debug:
    name: Windows x86 Debug
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: cmake --preset x86-debug-reports

      - name: Run tests and generate TeX reports
        id: verify
        shell: pwsh
        continue-on-error: true
        run: |
          cmake --build --preset verify-x86-debug
          "exit_code=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpm-test-report-windows-x86-debug
          path: |
            out/build/x86-debug-reports/test-reports/*.tex
            out/build/x86-debug-reports/test-reports/*.log
          if-no-files-found: error

      - name: Publish GitHub summary
        shell: pwsh
        run: |
          $overallStatus = if ('${{ steps.verify.outputs.exit_code }}' -eq '0') { 'PASS' } else { 'FAIL' }
          $rows = @(
            @('TC-0001 Usage/version check', 'out/build/x86-debug-reports/test-reports/tc-0001-report.tex', 'out/build/x86-debug-reports/test-reports/tc-0001-execution-evidence.tex'),
            @('TC-0002 Package initialization', 'out/build/x86-debug-reports/test-reports/tc-0002-report.tex', 'out/build/x86-debug-reports/test-reports/tc-0002-execution-evidence.tex'),
            @('TC-0003 Package archive build', 'out/build/x86-debug-reports/test-reports/tc-0003-report.tex', 'out/build/x86-debug-reports/test-reports/tc-0003-execution-evidence.tex'),
            @('TC-0004 Package archive installation', 'out/build/x86-debug-reports/test-reports/tc-0004-report.tex', 'out/build/x86-debug-reports/test-reports/tc-0004-execution-evidence.tex')
          )

          @"
          # WPM Test Report

          | Test Case | Result | Report |
          | --- | --- | --- |
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          foreach ($row in $rows) {
            $status = 'UNKNOWN'
            if (Test-Path -LiteralPath $row[2]) {
              $statusLine = Select-String -LiteralPath $row[2] -Pattern '\\item\[Overall Status\]\s+(\w+)' | Select-Object -First 1
              if ($statusLine) {
                $status = $statusLine.Matches[0].Groups[1].Value.ToUpperInvariant()
              }
            }

            $color = if ($status -eq 'PASS') { '#22863a' } else { '#cb2431' }

            "| $($row[0]) | <span style=""color: $color""><strong>$status</strong></span> | $($row[1]) |" |
              Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

          @"
          The generated TeX reports are attached to this workflow run as the `wpm-test-report-windows-x86-debug` artifact.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          if ($overallStatus -ne 'PASS') {
            exit 1
          }
