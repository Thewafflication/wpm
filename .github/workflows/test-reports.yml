name: Test Reports

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-metadata:
    name: Resolve dependency metadata
    runs-on: windows-2022
    outputs:
      miniz_version: ${{ steps.metadata.outputs.miniz_version }}
      miniz_commit: ${{ steps.metadata.outputs.miniz_commit }}
      libsodium_version: ${{ steps.metadata.outputs.libsodium_version }}
      libsodium_commit: ${{ steps.metadata.outputs.libsodium_commit }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch submodule tags
        shell: pwsh
        run: git submodule foreach --recursive 'git fetch --tags --force'

      - name: Check for newer dependency releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tests/check-dependency-releases.ps1

      - name: Lint C99 source
        shell: pwsh
        run: tests/lint-c99.ps1

      - name: Export dependency metadata
        id: metadata
        shell: pwsh
        run: tests/export-dependency-metadata.ps1 -GitHubOutput $env:GITHUB_OUTPUT

  windows-debug:
    name: Windows ${{ matrix.arch }} Debug
    needs: dependency-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            runner: windows-2022
            configure_preset: x86-debug-reports
            verify_preset: verify-x86-debug
          - arch: x64
            runner: windows-2022
            configure_preset: x64-debug-reports
            verify_preset: verify-x64-debug
          - arch: arm64
            runner: windows-11-arm
            configure_preset: arm64-debug-reports
            verify_preset: verify-arm64-debug

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset ${{ matrix.configure_preset }} `
            "-DWPM_MINIZ_VERSION_OVERRIDE=${{ needs.dependency-metadata.outputs.miniz_version }}" `
            "-DWPM_MINIZ_COMMIT_OVERRIDE=${{ needs.dependency-metadata.outputs.miniz_commit }}" `
            "-DWPM_LIBSODIUM_VERSION_OVERRIDE=${{ needs.dependency-metadata.outputs.libsodium_version }}" `
            "-DWPM_LIBSODIUM_COMMIT_OVERRIDE=${{ needs.dependency-metadata.outputs.libsodium_commit }}"

      - name: Verify requirements traceability
        shell: pwsh
        run: tests/verify-traceability.ps1

      - name: Run tests and generate TeX reports
        id: verify
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path bin/${{ matrix.arch }}/Debug | Out-Null
          cmake --build --preset ${{ matrix.verify_preset }} --parallel 2>&1 |
            Tee-Object -FilePath bin/${{ matrix.arch }}/Debug/verification-build.log
          $buildExitCode = $LASTEXITCODE
          "exit_code=$buildExitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($buildExitCode -ne 0) {
            "The ${{ matrix.arch }} Debug build failed before all expected artifacts were generated. See the workflow log for compiler or test output." |
              Set-Content -Path bin/${{ matrix.arch }}/Debug/build-failed.txt
          }
          exit 0

      - name: Collect build warnings in summary
        if: always()
        shell: pwsh
        run: tests/summarize-build-warnings.ps1 -LogPath bin/${{ matrix.arch }}/Debug/verification-build.log

      - name: Upload complete test report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wpm-test-report-windows-${{ matrix.arch }}-debug
          path: bin/${{ matrix.arch }}/Debug/
          if-no-files-found: error

      - name: Publish GitHub summary
        shell: pwsh
        run: |
          $overallStatus = if ('${{ steps.verify.outputs.exit_code }}' -eq '0') { 'PASS' } else { 'FAIL' }
          $rows = @(
            @('TC-0001 Usage/version check', 'tc-0001'),
            @('TC-0002 Package initialization', 'tc-0002'),
            @('TC-0003 Package archive build', 'tc-0003'),
            @('TC-0004 Package archive installation', 'tc-0004'),
            @('TC-0005 Package index signature verification', 'tc-0005'),
            @('TC-0006 Package metadata archive naming', 'tc-0006'),
            @('TC-0007 WPM self-installation', 'tc-0007'),
            @('TC-0008 Package removal', 'tc-0008'),
            @('TC-0009 GitHub Release artifact workflow', 'tc-0009'),
            @('TC-0010 Runtime mode detection', 'tc-0010'),
            @('TC-0011 HTTPS package repositories', 'tc-0011'),
            @('TC-0012 Package signing and validation', 'tc-0012'),
            @('TC-0013 Version-aware upgrades', 'tc-0013')
          )

          @"
          # WPM Test Report

          ## Build Versions
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          '```text' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          & bin/${{ matrix.arch }}/Debug/wpm.exe --version --verbose | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          @"

          | Test Case | Result | Report |
          | --- | --- | --- |
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          foreach ($row in $rows) {
            $status = 'UNKNOWN'
            $report = "bin/${{ matrix.arch }}/Debug/$($row[1])-report.tex"
            $evidence = "bin/${{ matrix.arch }}/Debug/$($row[1])-execution-evidence.tex"
            if (Test-Path -LiteralPath $evidence) {
              $statusLine = Select-String -LiteralPath $evidence -Pattern '\\item\[Overall Status\]\s+(\w+)' | Select-Object -First 1
              if ($statusLine) {
                $status = $statusLine.Matches[0].Groups[1].Value.ToUpperInvariant()
              }
            }

            $indicator = if ($status -eq 'PASS') { '🟢' } else { '🔴' }

            "| $($row[0]) | $indicator **$status** | $report |" |
              Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

          @"
          The generated executable, debug symbols, build log, and TeX reports are attached to this workflow run as the architecture-specific test-report artifact. Distributable packages are produced only by the tag-triggered Release workflow.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          if ($overallStatus -ne 'PASS') {
            exit 1
          }
