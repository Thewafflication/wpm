name: Test Reports

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-x86-debug:
    name: Windows x86 Debug
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch submodule tags
        shell: pwsh
        run: git submodule foreach --recursive 'git fetch --tags --force'

      - name: Configure
        shell: pwsh
        run: cmake --preset x86-debug-reports

      - name: Run tests and generate TeX reports
        id: verify
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path bin/x86/Debug | Out-Null
          cmake --build --preset verify-x86-debug
          "exit_code=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($LASTEXITCODE -ne 0) {
            "The x86 Debug build failed before all expected artifacts were generated. See the workflow log for compiler or test output." |
              Set-Content -Path bin/x86/Debug/build-failed.txt
          }
          exit 0

      - name: Upload complete test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpm-test-report-windows-x86-debug
          path: bin/x86/Debug/
          if-no-files-found: error

      - name: Build WPM package with test reports
        if: steps.verify.outputs.exit_code == '0'
        shell: pwsh
        run: cmake --build --preset package-x86-debug

      - name: Upload WPM package artifact
        if: steps.verify.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: wpm-package-windows-x86-debug
          path: bin/x86/Debug/packages/*.zip
          if-no-files-found: error

      - name: Publish GitHub summary
        shell: pwsh
        run: |
          $overallStatus = if ('${{ steps.verify.outputs.exit_code }}' -eq '0') { 'PASS' } else { 'FAIL' }
          $rows = @(
            @('TC-0001 Usage/version check', 'bin/x86/Debug/tc-0001-report.tex', 'bin/x86/Debug/tc-0001-execution-evidence.tex'),
            @('TC-0002 Package initialization', 'bin/x86/Debug/tc-0002-report.tex', 'bin/x86/Debug/tc-0002-execution-evidence.tex'),
            @('TC-0003 Package archive build', 'bin/x86/Debug/tc-0003-report.tex', 'bin/x86/Debug/tc-0003-execution-evidence.tex'),
            @('TC-0004 Package archive installation', 'bin/x86/Debug/tc-0004-report.tex', 'bin/x86/Debug/tc-0004-execution-evidence.tex'),
            @('TC-0005 Package index signature verification', 'bin/x86/Debug/tc-0005-report.tex', 'bin/x86/Debug/tc-0005-execution-evidence.tex'),
            @('TC-0006 Package metadata archive naming', 'bin/x86/Debug/tc-0006-report.tex', 'bin/x86/Debug/tc-0006-execution-evidence.tex'),
            @('TC-0007 WPM self-installation', 'bin/x86/Debug/tc-0007-report.tex', 'bin/x86/Debug/tc-0007-execution-evidence.tex'),
            @('TC-0008 Package removal', 'bin/x86/Debug/tc-0008-report.tex', 'bin/x86/Debug/tc-0008-execution-evidence.tex'),
            @('TC-0009 GitHub Release artifact workflow', 'bin/x86/Debug/tc-0009-report.tex', 'bin/x86/Debug/tc-0009-execution-evidence.tex'),
            @('TC-0010 Runtime mode detection', 'bin/x86/Debug/tc-0010-report.tex', 'bin/x86/Debug/tc-0010-execution-evidence.tex')
          )

          @"
          # WPM Test Report

          ## Build Versions
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          '```text' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          & bin/x86/Debug/wpm.exe --version --verbose | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          @"

          | Test Case | Result | Report |
          | --- | --- | --- |
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          foreach ($row in $rows) {
            $status = 'UNKNOWN'
            if (Test-Path -LiteralPath $row[2]) {
              $statusLine = Select-String -LiteralPath $row[2] -Pattern '\\item\[Overall Status\]\s+(\w+)' | Select-Object -First 1
              if ($statusLine) {
                $status = $statusLine.Matches[0].Groups[1].Value.ToUpperInvariant()
              }
            }

            $color = if ($status -eq 'PASS') { '#22863a' } else { '#cb2431' }

            "| $($row[0]) | <span style=""color: $color""><strong>$status</strong></span> | $($row[1]) |" |
              Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }

          @"
          The generated executable, debug symbols, and TeX reports are attached to this workflow run as the `wpm-test-report-windows-x86-debug` artifact. When verification passes, the `wpm-package-windows-x86-debug` artifact contains the indexed WPM ZIP package with the executable, deployment scripts, and generated TeX test reports.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          if ($overallStatus -ne 'PASS') {
            exit 1
          }
