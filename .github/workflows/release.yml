name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify ${{ matrix.arch }} Debug
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            runner: windows-2022
            configure_preset: x86-debug-reports
            verify_preset: verify-x86-debug
          - arch: x64
            runner: windows-2022
            configure_preset: x64-debug-reports
            verify_preset: verify-x64-debug
          - arch: arm64
            runner: windows-11-arm
            configure_preset: arm64-debug-reports
            verify_preset: verify-arm64-debug

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch submodule tags
        shell: pwsh
        run: git submodule foreach --recursive 'git fetch --tags --force'

      - name: Check for newer dependency releases
        if: matrix.arch == 'x86'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tests/check-dependency-releases.ps1

      - name: Configure verification build
        shell: pwsh
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Verify requirements traceability
        shell: pwsh
        run: tests/verify-traceability.ps1

      - name: Run verification suite
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin/${{ matrix.arch }}/Debug | Out-Null
          cmake --build --preset ${{ matrix.verify_preset }} 2>&1 |
            Tee-Object -FilePath bin/${{ matrix.arch }}/Debug/verification-build.log
          exit $LASTEXITCODE

      - name: Collect build warnings in summary
        if: always()
        shell: pwsh
        run: tests/summarize-build-warnings.ps1 -LogPath bin/${{ matrix.arch }}/Debug/verification-build.log

      - name: Upload verification evidence
        uses: actions/upload-artifact@v7
        with:
          name: wpm-release-verification-${{ matrix.arch }}
          path: bin/${{ matrix.arch }}/Debug/
          if-no-files-found: error

  build:
    name: Build ${{ matrix.arch }} Release
    needs: verify
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            configure_preset: x86-release
            build_preset: build-x86-release
          - arch: x64
            configure_preset: x64-release
            build_preset: build-x64-release
          - arch: arm64
            configure_preset: arm64-release
            build_preset: build-arm64-release

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch submodule tags
        shell: pwsh
        run: git submodule foreach --recursive 'git fetch --tags --force'

      - name: Configure
        shell: pwsh
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        shell: pwsh
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Prepare Release executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath "bin/${{ matrix.arch }}/Release/wpm.exe" -Destination "release/wpm-${{ matrix.arch }}.exe"

      - name: Upload Release executable
        uses: actions/upload-artifact@v7
        with:
          name: wpm-${{ matrix.arch }}-release-executable
          path: release/wpm-${{ matrix.arch }}.exe
          if-no-files-found: error

  package:
    name: Build WPM Release Packages
    needs: [verify, build]
    runs-on: windows-2022
    environment: release

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch submodule tags
        shell: pwsh
        run: git submodule foreach --recursive 'git fetch --tags --force'

      - name: Download verified x86 Debug package builder and reports
        uses: actions/download-artifact@v8
        with:
          name: wpm-release-verification-x86
          path: bin/x86/Debug

      - name: Download Release executables
        uses: actions/download-artifact@v8
        with:
          pattern: wpm-*-release-executable
          path: release-binaries
          merge-multiple: true

      - name: Materialize protected release signing key
        shell: pwsh
        env:
          WPM_RELEASE_PRIVATE_KEY: ${{ secrets.WPM_RELEASE_PRIVATE_KEY }}
        run: |
          if (-not $env:WPM_RELEASE_PRIVATE_KEY) { throw 'WPM_RELEASE_PRIVATE_KEY is not configured.' }
          $keyPath = Join-Path $env:RUNNER_TEMP 'wpm-release.private'
          [IO.File]::WriteAllText($keyPath, $env:WPM_RELEASE_PRIVATE_KEY, [Text.UTF8Encoding]::new($false))
          "WPM_RELEASE_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Release WPM packages with x86 Debug WPM
        shell: pwsh
        run: |
          $architectures = @('x86', 'x64', 'arm64')
          foreach ($architecture in $architectures) {
            cmake `
              "-DWPM_EXECUTABLE=$PWD/bin/x86/Debug/wpm.exe" `
              "-DWPM_PACKAGE_EXECUTABLE=$PWD/release-binaries/wpm-$architecture.exe" `
              "-DWPM_PACKAGE_STAGING_DIR=$PWD/out/release-package/$architecture" `
              "-DWPM_PACKAGE_OUTPUT_DIR=$PWD/release/packages" `
              "-DWPM_PACKAGE_ARCH=$architecture" `
              -DWPM_PACKAGE_DEBUG=false `
              "-DWPM_PACKAGE_SIGNING_KEY=$env:WPM_RELEASE_KEY_PATH" `
              "-DWPM_SETUP_SCRIPT=$PWD/setup.cmd" `
              "-DWPM_REMOVE_SCRIPT=$PWD/remove.cmd" `
              "-DWPM_REPORT_DIR=$PWD/bin/x86/Debug" `
              "-DWPM_DOCS_DIR=$PWD/docs" `
              "-DWPM_README_FILE=$PWD/README.md" `
              "-DWPM_LICENSE_FILE=$PWD/LICENSE.txt" `
              "-DWPM_THIRD_PARTY_NOTICES_FILE=$PWD/THIRD_PARTY_NOTICES.md" `
              -P cmake/BuildSelfPackage.cmake
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Validate signed Release WPM packages
        shell: pwsh
        run: |
          $env:WPM_DATA_DIR = Join-Path $env:RUNNER_TEMP 'wpm-release-validation'
          bin/x86/Debug/wpm.exe trust add release_keys/wpm-release.public
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $packages = @(Get-ChildItem -LiteralPath release/packages -Filter 'wpm-*.zip')
          if ($packages.Count -ne 3) { throw "Expected three release packages, found $($packages.Count)." }
          foreach ($package in $packages) {
            bin/x86/Debug/wpm.exe verify $package.FullName
            if ($LASTEXITCODE -ne 0) { throw "Release package validation failed: $($package.Name)" }
          }

      - name: Remove materialized release signing key
        if: always()
        shell: pwsh
        run: |
          if ($env:WPM_RELEASE_KEY_PATH -and (Test-Path -LiteralPath $env:WPM_RELEASE_KEY_PATH)) {
            Remove-Item -LiteralPath $env:WPM_RELEASE_KEY_PATH -Force
          }

      - name: Prepare public release key
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/keys | Out-Null
          Copy-Item -LiteralPath release_keys/wpm-release.public -Destination release/keys/wpm-release.public

      - name: Upload Release WPM packages
        uses: actions/upload-artifact@v7
        with:
          name: wpm-release-packages
          path: |
            release/packages/wpm-*.zip
            release/keys/wpm-release.public
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download Release WPM packages
        uses: actions/download-artifact@v8
        with:
          name: wpm-release-packages
          path: release

      - name: Create release package index
        shell: pwsh
        run: |
          $packages = Get-ChildItem -LiteralPath release/packages -Filter 'wpm-*.zip' | ForEach-Object {
            if ($_.Name -notmatch '^wpm-(x86|x64|arm64)-(.+)\.zip$') {
              throw "Unexpected release package name: $($_.Name)"
            }
            [ordered]@{
              name = 'wpm'
              version = $Matches[2]
              arch = $Matches[1]
              url = $_.Name
            }
          }
          if ($packages.Count -ne 3) { throw "Expected three release packages, found $($packages.Count)." }
          [ordered]@{ version = 1; packages = @($packages) } |
            ConvertTo-Json -Depth 3 |
            Set-Content -LiteralPath release/index.json -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/packages/wpm-*.zip
            release/index.json
            release/keys/wpm-release.public
